<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PlanningWorkouts</title>
  <!-- bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.0-beta1/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-0evHe/X+R7YkIZDRvuzKMRqM+OrBnVFBL6DOitfPri4tjfHxaWutUpFmBp4vmVor" crossorigin="anonymous">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.0-beta1/dist/js/bootstrap.bundle.min.js" integrity="sha384-pprn3073KE6tl6bjs2QrFaJGz5/SUsLqktiwsUTF55Jfv3qYSDhgCecCxMW52nD2" crossorigin="anonymous"></script>
  <!-- CSS -->
  <link rel="stylesheet" href="assets/css/style.css">
  <!-- fontawesome -->
  <script src="https://kit.fontawesome.com/aa83edf939.js" crossorigin="anonymous"></script>
</head>
</head>
<body>
  <main>
    <h1>
      <i class="fa-solid fa-dumbbell"></i>
      Planning Workouts
    </h1>
    <form id="login">
      <div class="mb-3">
        <input type="email" class="form-control" id="login-email" placeholder="Email">
      </div>
      <div class="mb-3">
        <input type="password" class="form-control" id="login-password" placeholder="Password">
      </div>
      <button type="submit" id="login-button" class="btn btn-primary">Log In</button>
    </form>
    <form id="register">
      <div id="fullname-div">
        <div class="mb-3">
          <input type="text" class="form-control" id="register-name" placeholder="Name">
        </div>
        <div class="mb-3">
          <input type="text" class="form-control" id="register-lastname" placeholder="Last name">
        </div>
      </div>
      <div class="mb-3">
        <input type="email" class="form-control" id="register-email" placeholder="Email">
      </div>
      <div class="mb-3">
        <input type="password" class="form-control" id="register-password" placeholder="New Password">
      </div>
      <div class="mb-3">
        <label class="form-label">Birth date</label>
        <div class="row-options">
          <select id="day" class="form-select" size="2" aria-label="Default select example">
          </select>
          <select id="month" class="form-select" size="2" aria-label="Default select example">
          </select>
          <select id="year" class="form-select" size="2" aria-label="Default select example">
          </select>
        </div>
      </div>
      <div class="mb-3">
        <label class="form-label">Genre</label>
        <div class="row-options mb-3">
          <input type="radio" class="btn-check" name="options" id="option1" autocomplete="off">
          <label class="btn btn-outline-light" for="option1">Feminine</label>
          <input type="radio" class="btn-check" name="options" id="option2" autocomplete="off">
          <label class="btn btn-outline-light" for="option2">Male</label>
          <input type="radio" class="btn-check" name="options" id="option3" autocomplete="off">
          <label class="btn btn-outline-light" for="option3">Custom</label>
        </div>
        <div id="custom-genre">
          <div class="mb-3">
            <select class="form-select" aria-label="Default select example">
              <option selected>select your pronoun</option>
              <option value="1">Famele: "Wish her a happy birthday!"</option>
              <option value="2">Male: "Wish him a happy birthday!"</option>
              <option value="3">Neutral: "Wish her/him a happy birthday!"</option>
            </select>
          </div>
          <div>
            <input type="text" class="form-control" id="genre-name" placeholder="Genre (optional)">
          </div>
        </div>
        <div>
        </div>
      </div>
      <button type="submit" id="register-button" class="btn btn-primary">Register</button>
    </form>
    <button id="change-button" class="btn btn-success">Create new account</button>
  </main>
  <!-- script -->
  <script src="assets/js/script.js"></script>
</body>
</html>
